[build]
  publish = "."
  functions = "functions"

# Merch page — redirect /merch to query-param route (avoids folder/path conflicts)
[[redirects]]
  from = "/merch"
  to = "/?page=merch"
  status = 301

[[redirects]]
  from = "/merch/"
  to = "/?page=merch"
  status = 301

# Rewrite /api/* to functions (works on custom domain)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
